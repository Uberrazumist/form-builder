name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- БЭКЕНД ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build backend binary
        run: |
          cd backend
          CGO_ENABLED=0 go build -o hello main.go

      # --- ФРОНТЕНД ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # --- КОПИРОВАНИЕ БЭКЕНДА ---
      - name: Copy backend binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/hello"
          target: "/root/form-builder/backend/"
          strip_components: 1

      # --- КОПИРОВАНИЕ ФРОНТЕНДА ---
      - name: Copy frontend files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/"
          target: "/var/www/form-builder/"
          strip_components: 2

      # --- СОЗДАНИЕ .env НА ВМ ---
      - name: Create .env file on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /root/form-builder/.env <<EOF
            DB_HOST=db
            DB_USER=formuser
            DB_PASSWORD=formpass
            DB_NAME=formsdb
            DB_PORT=5432
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

      # --- ПЕРЕЗАПУСК КОНТЕЙНЕРОВ ---
      - name: Restart containers on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/form-builder
            docker compose down
            docker compose up -d --build
