name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build backend
        run: |
          cd backend
          go build -o hello main.go

      - name: Run tests (if any)
        run: |
          cd backend
          go test ./... || echo "No tests yet, but build succeeded!"
