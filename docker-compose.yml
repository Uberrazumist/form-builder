services:
  db:
    image: postgres:15-alpine
    container_name: form-db
    environment:
      POSTGRES_USER: formuser
      POSTGRES_PASSWORD: formpass
      POSTGRES_DB: formsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: form-backend
    ports:
      - "8081:8080"
    environment:
      DB_HOST: db
      DB_USER: formuser
      DB_PASSWORD: formpass
      DB_NAME: formsdb
      DB_PORT: 5432
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
